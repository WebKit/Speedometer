name: Test

on:
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]

    # Allows you to run this workflow manually from the Actions tab
    workflow_dispatch:

jobs:
    linters:
        name: Linters
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Branch
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version-file: "package.json"
                  cache: "npm"

            - name: Install Node Packages
              run: npm ci

            - name: Run package.json linter
              run: npm run lint:pkg

            - name: Run linters
              run: npm run format

            - name: Check if anything changed
              run: |
                  git_status="`LC_ALL=C git status --porcelain --ignore-submodules -unormal 2>&1`"
                  if [ -n "$git_status" ]; then
                      printf "Some file(s) changed as the result of formatting, this means that you need to run the formatter on your patch.\n"
                      printf "Here is what changed:\n"
                      printf -- "$git_status\n\n"
                      printf "And here is the diff:\n"
                      git diff -U8
                      exit 1
                  fi

    test-node:
        name: Node Unit Tests
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Branch
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version-file: "package.json"
                  cache: "npm"

            - name: Install Node Packages
              run: npm ci

            - name: Run Node Unit Tests
              run: npm test

    test:
        name: Test
        runs-on: macos-latest
        strategy:
            matrix:
                browser: [chrome, firefox]
        steps:
            - name: Checkout Branch
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version-file: "package.json"
                  cache: "npm"

            - name: Install Node Packages
              run: npm ci

            - name: Run Unit Tests
              run: |
                  echo "Running in $BROWSER"
                  npm run test:${{ matrix.browser }}

            - name: Run end2end Tests
              run: |
                  echo "Running in $BROWSER"
                  npm run test-e2e:${{ matrix.browser }}
